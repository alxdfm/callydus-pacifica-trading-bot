services:
  postgres:
    image: postgres:16-alpine
    container_name: pacifica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pacifica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pacifica_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pacifica"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pacifica_postgres_data:
