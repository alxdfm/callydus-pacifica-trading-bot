version: 1
applications:
  - appRoot: packages/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - corepack enable
            - corepack prepare pnpm@10.11.0 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @pacifica/frontend build
      artifacts:
        baseDirectory: ../../packages/frontend/dist
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
